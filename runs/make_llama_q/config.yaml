# Example training config for scripts/train.py
# Paths are resolved relative to the repo root.

student_model: "meta-llama/Llama-3.1-8B-Instruct"
training_path: null  # If set, resume training from this saved training checkpoint instead of starting fresh from student_model.
training_data: "/workspace/when-does-sft-degrade-capabilities/stored_outputs/qwen_30b_alpaca_16000.json"
train_system_prompt_file: "prompts/benign_system_prompt.txt"  # .txt → wrapped as a system message; .json → list of chat messages used as the SFTExample prefix
eval_system_prompt_file: "prompts/benign_system_prompt.txt"
save_dir: "runs/make_llama_q"

# Mirrors utils.TrainConfig. Any field can be null to fall back to the
# dataclass default. num_examples is also used to slice training_data.
train_config:
  lr: 1e-4
  batch_size: 32
  num_epochs: 1
  num_examples: 16000
  save_sampling_step: 1
  save_training_step: 1
  save_every_n_steps: 100
  save_training_every_n_steps: null

# Mirrors utils.GenerateConfig — used for every eval.
generate_config:
  temperature: 0.0
  max_tokens: 10000
  max_concurrent: 2000
  num_samples: 1
  cache: true

eval:
  # Set any of these to null to skip that eval.
  mmlu_num_problems: null
  ifeval_num_problems: null
  olympiads_num_problems: null
  olympiads_split: "val"
  math500_num_problems: null  # null = full integer subset
  judge_model: "Qwen/Qwen3-30B-A3B-Instruct-2507"
